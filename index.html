<html>
  <head>
    <base href="abandonedmuse" />
    <title>User Profile Viewer</title>
    <style>
      :root {
        /* @tweakable Main background color */
        --bg-color: #120638;
        
        /* @tweakable Primary text color */
        --text-color: #ffffff;
        
        /* @tweakable Secondary text color */
        --text-secondary: #a8b2ff;
        
        /* @tweakable Card background color */
        --card-bg: rgba(16, 9, 44, 0.8);
        
        /* @tweakable Stat card background color */
        --stats-card-bg: rgba(16, 9, 44, 0.8);
        
        /* @tweakable Primary neon color */
        --neon-primary: #ff00ff;
        
        /* @tweakable Secondary neon color */
        --neon-secondary: #00eeff;
        
        /* @tweakable Tertiary neon color */
        --neon-tertiary: #bf00ff;
        
        /* @tweakable Neon glow intensity */
        --neon-glow: 5px;
        
        /* @tweakable Border width for neon effects */
        --neon-border-width: 2px;
        
        /* @tweakable Border radius for cards */
        --card-radius: 1rem;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid var(--neon-secondary);
        border-right: 3px solid var(--neon-primary);
        border-radius: 50%;
        animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        box-shadow: 0 0 10px rgba(255,105,180,0.5);
      }
      .loading-container {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 2rem 0;
        opacity: 0.8;
      }
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
      .loading-container {
        animation: pulse 2s ease-in-out infinite;
      }
      .value.joined {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .value.joined .ago {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: -0.5rem;
      }
      #grid-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
      }
      .container {
        position: relative;
        z-index: 1;
      }
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background: var(--bg-color);
        padding: 2rem;
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        border: var(--neon-border-width) solid var(--neon-primary);
        border-radius: var(--card-radius);
        padding: 2rem;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary), 
                    inset 0 0 var(--neon-glow) var(--neon-primary);
        background-color: rgba(0, 0, 0, 0.3);
      }
      .profile-header {
        background: var(--card-bg);
        border-radius: var(--card-radius);
        padding: 2rem;
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary), 
                    inset 0 0 calc(var(--neon-glow) * 0.5) var(--neon-secondary);
        border: var(--neon-border-width) solid var(--neon-secondary);
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2rem;
      }
      .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .profile-info h1 {
        font-size: 2.5rem;
        text-shadow: 0 0 5px var(--neon-primary), 0 0 10px var(--neon-primary);
      }
      .profile-info h1 span {
        outline: none;
        border-bottom: 1px dashed var(--neon-secondary);
        padding: 0 4px;
      }
      .username-hint {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-left: 1rem;
        opacity: 1;
        transition: opacity 0.3s ease;
        user-select: none;
        cursor: default;
      }
      .username-hint.hidden {
        opacity: 0;
      }
      #username[contenteditable=true]:hover {
        background: rgba(255, 0, 255, 0.2);
        border-radius: 4px;
        cursor: text;
      }
      #username[contenteditable=true]:focus {
        background: rgba(255, 0, 255, 0.3);
        border-radius: 4px;
      }
      .social-links {
        display: flex;
        gap: 1rem;
        margin: 1rem 0;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
        margin-top: 2rem;
      }
      .stat-card {
        background: var(--stats-card-bg);
        padding: 1.5rem;
        border-radius: var(--card-radius);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        text-align: center;
        transition: all 0.3s ease;
      }
      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .stat-card h3 {
        color: var(--text-secondary);
        font-size: 1.3rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        text-align: center;
        text-shadow: 0 0 5px var(--neon-tertiary);
      }
      .stat-card .value {
        font-size: 3rem;
        font-weight: bold;
        color: var(--text-color);
        text-align: center;
        text-shadow: 0 0 10px var(--neon-primary);
      }
      .view-button {
        background: rgba(0, 0, 0, 0.3);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        color: var(--text-secondary);
        padding: 0.8rem 1.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1.1rem;
        box-shadow: 0 0 calc(var(--neon-glow) * 0.5) var(--neon-tertiary);
      }
      .view-button:hover {
        background: rgba(191, 0, 255, 0.2);
        color: var(--text-color);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .view-button.active {
        background: var(--neon-tertiary);
        color: var(--text-color);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .view-content {
        margin-top: 1.5rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }
      .card {
        background: var(--card-bg);
        border-radius: 0.5rem;
        overflow: hidden;
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary);
        border: var(--neon-border-width) solid var(--neon-secondary);
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-secondary);
      }
      .card-content {
        padding: 1rem;
      }
      .card h3 {
        margin-bottom: 0.5rem;
        color: var(--text-color);
        text-shadow: 0 0 5px var(--neon-secondary);
      }
      .card-meta {
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .loading-container {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 2rem 0;
      }
      .recent-follower-card {
        background: var(--stats-card-bg);
        padding: 1.5rem;
        min-height: 100%;
        border-radius: var(--card-radius);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
        border: var(--neon-border-width) solid var(--neon-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        transition: all 0.3s ease;
      }
      .recent-follower-card:hover {
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
      .recent-follower-card h3 {
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        text-align: center;
        text-shadow: 0 0 5px var(--neon-primary);
      }
      .recent-follower-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: var(--neon-border-width) solid var(--neon-primary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .recent-follower-name {
        font-size: 1.1rem;
        color: var(--text-color);
        text-align: center;
        text-shadow: 0 0 5px var(--neon-primary);
      }
      .load-more {
        display: none;
        margin: 2rem auto;
        padding: 1rem 2rem;
        background: var(--neon-primary);
        border: none;
        border-radius: 0.5rem;
        color: white;
        cursor: pointer;
        font-size: 1.1rem;
        transition: background 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .load-more:hover {
        background: #d400d4;
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
      .preview-image {
        width: 100%;
        height: 200px;
        background: rgba(0, 0, 0, 0.5);
        object-fit: cover;
        transition: opacity 0.2s;
      }
      .card:hover .preview-image {
        opacity: 0.9;
      }
      .card-stats {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .user-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 1rem;
      }
      .user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        background: var(--card-bg);
        padding: 1rem;
        border-radius: var(--card-radius);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .user-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .user-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 0.5rem;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .user-name {
        font-size: 0.9rem;
        color: var(--text-color);
        word-break: break-word;
        text-shadow: 0 0 5px var(--neon-tertiary);
      }
      .sort-controls {
        margin-bottom: 1.5rem;
        display: flex;
        gap: 0.5rem;
      }
      .sort-button {
        background: rgba(0, 0, 0, 0.3);
        border: var(--neon-border-width) solid var(--neon-secondary);
        color: var(--text-secondary);
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 0 calc(var(--neon-glow) * 0.5) var(--neon-secondary);
      }
      .sort-button:hover {
        background: rgba(0, 238, 255, 0.2);
        color: var(--text-color);
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary);
      }
      .sort-button.active {
        background: var(--neon-secondary);
        color: var(--text-color);
        box-shadow: 0 0 calc(var(--neon-glow) * 1.5) var(--neon-secondary);
      }
      .search-box {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        display: flex;
        align-items: center;
      }
      .search-input {
        padding: 8px 12px;
        border-radius: 4px;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 16px;
        width: 200px;
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .search-input::placeholder {
        color: var(--text-secondary);
      }
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        z-index: 1000;
      }
      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        background: var(--card-bg);
        border-radius: 1rem;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        z-index: 1001;
        width: 80vw;
        height: 80vh;
        display: flex;
        flex-direction: column;
        border: var(--neon-border-width) solid var(--neon-primary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .modal.active {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
      }
      .modal-close {
        position: absolute;
        top: -40px;
        right: 0;
        background: none;
        border: none;
        color: white;
        font-size: 2rem;
        cursor: pointer;
        padding: 0.5rem;
        transition: transform 0.2s;
        text-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .modal-close:hover {
        transform: scale(1.1);
      }
      .modal iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 1rem;
        flex: 1;
        margin-bottom: 10px;
      }
      .open-new-tab {
        text-align: center;
        padding: 10px;
        text-decoration: none;
        color: var(--neon-secondary);
        font-size: 1rem;
        transition: color 0.2s;
        text-shadow: 0 0 5px var(--neon-secondary);
      }
      .open-new-tab:hover {
        color: white;
        text-shadow: 0 0 10px var(--neon-secondary);
      }
      #recent-follower {
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      #recent-follower:hover {
        transform: scale(1.05);
      }
      .search-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--neon-primary);
        color: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        cursor: pointer;
        margin-left: 10px;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .search-toggle:hover {
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
    </style>
  </head>
  <body>
    <canvas id="grid-background"></canvas>
    <div class="container" id="app">
      <div class="search-box">
        <input type="text" class="search-input" placeholder="Enter username..." id="user-search">
        <button id="search-toggle" class="search-toggle">🔍</button>
      </div>
      <div style="display: grid; grid-template-columns: 1fr auto; gap: 2rem; margin-bottom: 2rem;">
        <div class="profile-header">
          <img class="avatar" id="avatar" alt="Profile avatar">
          <div class="profile-info">
            <h1>
              <span id="username" contenteditable="true" style="outline: none; border-bottom: 1px dashed var(--neon-secondary); padding: 0 4px;"></span>
              <span class="username-hint">← You can edit the name!</span>
            </h1>
            <p id="description"></p>
            <div class="social-links"></div>
          </div>
        </div>
        <div class="stat-card recent-follower-card" style="margin: 0; height: fit-content;">
          <h3>🥰 Latest Follower</h3>
          <div id="recent-follower">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>
      <div class="stats">
        <div class="stat-card">
          <h3>🌐 Projects</h3>
          <div class="value" id="sites-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>👁️ Views</h3>
          <div class="value" id="views-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>❤️ Likes</h3>
          <div class="value" id="likes-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🥰 Followers</h3>
          <div class="value" id="followers-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>😍 Following</h3>
          <div class="value" id="following-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🎉 Popularity</h3>
          <div class="value" id="popularity-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>⭐ Quality</h3>
          <div class="value" id="rating-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>📅 Joined</h3>
          <div class="value" id="joined-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>👥 Friends</h3>
          <div class="value" id="friends-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🤫 Unposted</h3>
          <div class="value" id="unposted-count"><div class="loading-spinner"></div></div>
        </div>
      </div>
      <div class="content-section">
        <div class="sort-controls">
          <button class="view-button active" data-view="projects">Projects</button>
          <button class="view-button" data-view="followers">Followers</button>
          <button class="view-button" data-view="following">Following</button>
          <button class="view-button" data-view="friends">Friends</button>
        </div>
        <div id="projects-view" class="view-content">
          <div class="sort-controls">
            <button class="sort-button active" data-sort="recent">Recent</button>
            <button class="sort-button" data-sort="views">Most Viewed</button>
            <button class="sort-button" data-sort="likes">Most Liked</button>
          </div>
          <div class="grid" id="projects-grid"></div>
          <div class="loading-container" id="projects-loading">
            <div class="loading-spinner"></div>
          </div>
          <button id="load-more-projects" class="load-more">Load More</button>
        </div>
        <div id="followers-view" class="view-content" style="display:none">
          <div class="user-grid" id="followers-grid"></div>
          <div class="loading-container" id="followers-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <div id="following-view" class="view-content" style="display:none">
          <div class="user-grid" id="following-grid"></div>
          <div class="loading-container" id="following-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <div id="friends-view" class="view-content" style="display:none">
          <div class="user-grid" id="friends-grid"></div>
          <div class="loading-container" id="friends-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close">×</button>
        <iframe></iframe>
        <a class="open-new-tab" target="_blank">↗️ Open in new tab</a>
      </div>
    </div>
    
    <script>
      // Initialize WebsimSocket for persistent data storage
      const room = new WebsimSocket();
      
      // Config and Tweakable Values
      /* @tweakable Number of grid lines in the background */
      const gridLineCount = 20;
      
      /* @tweakable Grid horizon position (0.0-1.0, higher values push horizon down) */
      const gridHorizon = 0.5;
      
      /* @tweakable Grid animation speed (pixels per second) */
      const gridSpeed = 20;
      
      /* @tweakable Primary grid color */
      const gridColorPrimary = "#ff00ff";
      
      /* @tweakable Secondary grid color */
      const gridColorSecondary = "#00eeff";
      
      /* @tweakable Grid line width */
      const gridLineWidth = 2;
      
      /* @tweakable Grid line glow intensity */
      const gridGlowIntensity = 10;
      
      /* @tweakable Sun size in pixels */
      const synthSunSize = 120;
      
      /* @tweakable Sun color */
      const synthSunColor = "#ff00ff";
      
      /* @tweakable Base size of user avatar in follower/following lists in pixels */
      const userAvatarSize = 80;
      
      /* @tweakable Height of the project preview image in pixels */
      const projectPreviewHeight = 200;
      
      /* @tweakable Maximum projects to load per batch */
      const projectBatchSize = 50;
      
      /* @tweakable Maximum followers/following to load per batch */
      const userBatchSize = 50;

      /* @tweakable Format large numbers with commas (true) or use compact notation (false) */
      const useCommaFormatting = true;
      
      /* @tweakable Enable percentile calculations for stats (can slow down page for large datasets) */
      const enablePercentiles = true;
      
      /* @tweakable Number of projects to load before calculating initial stats */
      const initialStatsProjectCount = 10;
      
      /* @tweakable Enable automatically generated bio text */
      const enableAutoBio = true;
      
      /* @tweakable Thresholds for Popularity Score (Views, Likes) - from highest to lowest */
      const popularityThresholds = [
        { score: 10, views: 20000, likes: 325 },
        { score: 9, views: 10000, likes: 250 },
        { score: 8, views: 5000, likes: 120 },
        { score: 7, views: 2500, likes: 75 },
        { score: 6, views: 1000, likes: 40 },
        { score: 5, views: 500, likes: 20 },
        { score: 4, views: 250, likes: 10 },
        { score: 3, views: 100, likes: 5 },
        { score: 2, views: 50, likes: 2 },
        { score: 1, views: 10, likes: 0 }
      ];
  
      /* @tweakable Quality rating calculation method: "viewsPerLike" or "percentile" */
      const qualityRatingMethod = "viewsPerLike";
  
      /* @tweakable Thresholds for Quality Rating (Views per Like ratio - lower is better quality) */
      const ratingThresholds = [
        { score: 5, viewsPerLike: 40 },   // 5/5 rating if fewer than 40 views per like
        { score: 4, viewsPerLike: 80 },   // 4/5 rating if between 40-80 views per like
        { score: 3, viewsPerLike: 120 },  // 3/5 rating if between 80-120 views per like
        { score: 2, viewsPerLike: 160 },  // 2/5 rating if between 120-160 views per like
        { score: 1, viewsPerLike: Infinity } // 1/5 rating if more than 160 views per like
      ];
  
      /* @tweakable Minimum quality rating when likes exist but views are low */
      const minimumRatingWithLikes = 3;
  
      /* @tweakable Default rating when likes exist but no views */
      const defaultRatingForLikesNoViews = 5;
  
      /* @tweakable Default rating when views exist but no likes */

      const apiRetryDelay = 1000;

      // ===== DATA HANDLING FUNCTIONS =====
  
      /**
       * Format numbers according to settings
       */
      function formatNumber(num) {
        if (num === undefined || num === null) return '0';
        
        if (useCommaFormatting || num < numberFormatThreshold) {
          return num.toLocaleString();
        } else {
          if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
          } else if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'K';
          } else {
            return num.toString();
          }
        }
      }
  
      /**
       * Store user statistics in WebsimSocket persistent storage
       */
      async function storeUserStats(stats) {
        try {
          await room.collection('user_stats').create({
            username: stats.username,
            stats: stats,
            timestamp: new Date().toISOString()
          });
        } catch (error) {
          console.error('Error storing user stats:', error);
        }
      }
  
      /**
       * Calculate percentile of a value compared to stored stats
       */
      async function calculatePercentile(value, statName) {
        if (!enablePercentiles) return null;
        
        try {
          const records = room.collection('user_stats').getList();
          if (!records || records.length === 0) return null;
          
          const values = records
            .filter(r => r.stats && r.stats[statName] !== undefined && r.stats[statName] !== null)
            .map(r => r.stats[statName]);
          
          if (values.length === 0) return null;
          
          values.sort((a, b) => b - a);
          const position = values.findIndex(v => v <= value) + 1;
          return Math.round((1 - (position / values.length)) * 100);
        } catch (error) {
          console.error('Error calculating percentile:', error);
          return null;
        }
      }
  
      /**
       * Update a stat element with value and percentile information
       */
      async function updateStatWithPercentile(elementId, value, statName) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        if (isNaN(value) || value === undefined || value === null) {
          element.innerHTML = '0';
          return;
        }
        
        try {
          const percentile = await calculatePercentile(value, statName);
          let suffix = "";
          
          if (statName === 'popularity') {
            suffix = "/10";
          } else if (statName === 'rating') {
            suffix = "/5";
          }
          
          if (percentile === null || isNaN(percentile)) {
            element.innerHTML = `${formatNumber(value)}${suffix}`;
          } else {
            element.innerHTML = `
              ${formatNumber(value)}${suffix}
              <div style="font-size: 0.8rem; color: #888; margin-top: 0.5rem;">
                Top ${percentile}%
              </div>
            `;
          }
        } catch (error) {
          console.error(`Error updating stat ${elementId}:`, error);
          element.innerHTML = `${formatNumber(value) || '0'}`;
        }
      }
  
      /**
       * Fetch API data with retry capability
       */
      async function fetchWithRetry(url, options = {}, retries = maxApiRetries) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            throw new Error(`API request failed with status ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (retries <= 0) throw error;
          
          console.warn(`API request failed, retrying... (${maxApiRetries - retries + 1}/${maxApiRetries})`);
          await new Promise(resolve => setTimeout(resolve, apiRetryDelay));
          return fetchWithRetry(url, options, retries - 1);
        }
      }

      /**
       * Calculate popularity score based on views and likes
       */
      function calculatePopularity(views, likes) {
        // Start from highest thresholds and work down
        for (const threshold of popularityThresholds) {
          if (views >= threshold.views && likes >= threshold.likes) {
            return threshold.score;
          }
        }
        
        // If no threshold matched both criteria, try to match either views or likes
        const viewScore = popularityThresholds.find(t => views >= t.views)?.score || 0;
        const likeScore = popularityThresholds.find(t => likes >= t.likes)?.score || 0;
        
        // Return the higher of the two scores
        return Math.max(viewScore, likeScore, 1); // Ensure minimum score of 1
      }
  
      /**
       * Calculate quality rating based on views per like ratio
       */
      function calculateQualityRating(views, likes) {
        // Handle special cases
        if (likes <= 0 && views <= 0) {
          return defaultRatingForNoActivity; // No activity
        } else if (likes > 0 && views <= 0) {
          return defaultRatingForLikesNoViews; // Likes but no views (best quality)
        } else if (views > 0 && likes <= 0) {
          return defaultRatingForViewsNoLikes; // Views but no likes (lowest quality)
        }
        
        // Calculate views per like ratio
        const viewsPerLike = views / likes;
        
        // Find the appropriate threshold for the views per like ratio
        for (const threshold of ratingThresholds) {
          if (viewsPerLike <= threshold.viewsPerLike) {
            return threshold.score;
          }
        }
        
        // If we reach here, the ratio is higher than all thresholds
        return minimumRatingWithLikes; // Default to minimum
      }

          // Calculate popularity and rating based on these direct values

          const rating = calculateQualityRating(stats.total_views || 0, stats.total_likes || 0);
          
          // Update the stats display
          await updateStatWithPercentile('popularity-count', popularityScore, 'popularity');

      }

      // ===== SYNTHWAVE BACKGROUND ANIMATION =====
      /**
       * Initialize synthwave grid background
       */
      function initSynthwaveBackground() {
        const canvas = document.getElementById('grid-background');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas to window size
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Animation variables
        let offset = 0;
        
        // Animation loop
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Draw background gradient
          const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
          gradient.addColorStop(0, '#120638');
          gradient.addColorStop(0.5, '#2d1b69');
          gradient.addColorStop(1, '#5a1a80');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          // Draw sun
          const sunRadius = synthSunSize / 2;
          const sunY = canvas.height * gridHorizon;
          ctx.beginPath();
          ctx.arc(canvas.width / 2, sunY, sunRadius, 0, Math.PI * 2);
          ctx.fillStyle = synthSunColor;
          ctx.shadowColor = synthSunColor;
          ctx.shadowBlur = 30;
          ctx.fill();
          ctx.shadowBlur = 0;
          
          // Draw horizontal grid lines
          const horizonY = canvas.height * gridHorizon;
          const gridSpacing = canvas.width / gridLineCount;
          
          // Reset shadows for grid
          ctx.shadowColor = gridColorPrimary;
          ctx.shadowBlur = gridGlowIntensity;
          
          // Vertical lines (perspective)
          ctx.lineWidth = gridLineWidth;
          
          for (let i = 0; i <= gridLineCount; i++) {
            const x = i * gridSpacing;
            
            // Primary lines
            ctx.beginPath();
            ctx.moveTo(x, horizonY);
            ctx.lineTo(x, canvas.height);
            ctx.strokeStyle = gridColorPrimary;
            ctx.stroke();
          }
          
          // Horizontal lines with animation
          const horizontalLines = 20;
          const animatedOffset = (offset % gridSpacing);
          
          ctx.shadowColor = gridColorSecondary;
          
          for (let i = 0; i <= horizontalLines; i++) {
            const progress = i / horizontalLines;
            const y = horizonY + (canvas.height - horizonY) * progress;
            
            // Calculate perspective width
            const perspectiveWidth = progress * canvas.width * 0.8;
            const xStart = (canvas.width - perspectiveWidth) / 2;
            const xEnd = xStart + perspectiveWidth;
            
            ctx.beginPath();
            ctx.moveTo(xStart, y);
            ctx.lineTo(xEnd, y);
            ctx.strokeStyle = gridColorSecondary;
            ctx.stroke();
          }
          
          // Update animation
          offset += gridSpeed / 60; // Speed adjusted for 60fps
          
          // Continue animation
          requestAnimationFrame(animate);
        }
        
        // Start animation
        animate();
      }
