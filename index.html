<html>
  <head>
    <base href="abandonedmuse" />
    <title>User Profile Viewer</title>
    <style>
      :root {
        /* @tweakable Main background color */
        --bg-color: #120638;
        
        /* @tweakable Primary text color */
        --text-color: #ffffff;
        
        /* @tweakable Secondary text color */
        --text-secondary: #a8b2ff;
        
        /* @tweakable Card background color */
        --card-bg: rgba(16, 9, 44, 0.8);
        
        /* @tweakable Stat card background color */
        --stats-card-bg: rgba(16, 9, 44, 0.8);
        
        /* @tweakable Primary neon color */
        --neon-primary: #ff00ff;
        
        /* @tweakable Secondary neon color */
        --neon-secondary: #00eeff;
        
        /* @tweakable Tertiary neon color */
        --neon-tertiary: #bf00ff;
        
        /* @tweakable Neon glow intensity */
        --neon-glow: 5px;
        
        /* @tweakable Border width for neon effects */
        --neon-border-width: 2px;
        
        /* @tweakable Border radius for cards */
        --card-radius: 1rem;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid var(--neon-secondary);
        border-right: 3px solid var(--neon-primary);
        border-radius: 50%;
        animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        box-shadow: 0 0 10px rgba(255,105,180,0.5);
      }
      .loading-container {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 2rem 0;
        opacity: 0.8;
      }
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
      .loading-container {
        animation: pulse 2s ease-in-out infinite;
      }
      .value.joined {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .value.joined .ago {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: -0.5rem;
      }
      #grid-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
      }
      .container {
        position: relative;
        z-index: 1;
      }
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background: var(--bg-color);
        padding: 2rem;
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        border: var(--neon-border-width) solid var(--neon-primary);
        border-radius: var(--card-radius);
        padding: 2rem;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary), 
                    inset 0 0 var(--neon-glow) var(--neon-primary);
        background-color: rgba(0, 0, 0, 0.3);
      }
      .profile-header {
        background: var(--card-bg);
        border-radius: var(--card-radius);
        padding: 2rem;
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary), 
                    inset 0 0 calc(var(--neon-glow) * 0.5) var(--neon-secondary);
        border: var(--neon-border-width) solid var(--neon-secondary);
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2rem;
      }
      .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .profile-info h1 {
        font-size: 2.5rem;
        text-shadow: 0 0 5px var(--neon-primary), 0 0 10px var(--neon-primary);
      }
      .profile-info h1 span {
        outline: none;
        border-bottom: 1px dashed var(--neon-secondary);
        padding: 0 4px;
      }
      .username-hint {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-left: 1rem;
        opacity: 1;
        transition: opacity 0.3s ease;
        user-select: none;
        cursor: default;
      }
      .username-hint.hidden {
        opacity: 0;
      }
      #username[contenteditable=true]:hover {
        background: rgba(255, 0, 255, 0.2);
        border-radius: 4px;
        cursor: text;
      }
      #username[contenteditable=true]:focus {
        background: rgba(255, 0, 255, 0.3);
        border-radius: 4px;
      }
      .social-links {
        display: flex;
        gap: 1rem;
        margin: 1rem 0;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
        margin-top: 2rem;
      }
      .stat-card {
        background: var(--stats-card-bg);
        padding: 1.5rem;
        border-radius: var(--card-radius);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        text-align: center;
        transition: all 0.3s ease;
      }
      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .stat-card h3 {
        color: var(--text-secondary);
        font-size: 1.3rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        text-align: center;
        text-shadow: 0 0 5px var(--neon-tertiary);
      }
      .stat-card .value {
        font-size: 3rem;
        font-weight: bold;
        color: var(--text-color);
        text-align: center;
        text-shadow: 0 0 10px var(--neon-primary);
      }
      .view-button {
        background: rgba(0, 0, 0, 0.3);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        color: var(--text-secondary);
        padding: 0.8rem 1.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1.1rem;
        box-shadow: 0 0 calc(var(--neon-glow) * 0.5) var(--neon-tertiary);
      }
      .view-button:hover {
        background: rgba(191, 0, 255, 0.2);
        color: var(--text-color);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .view-button.active {
        background: var(--neon-tertiary);
        color: var(--text-color);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .view-content {
        margin-top: 1.5rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }
      .card {
        background: var(--card-bg);
        border-radius: 0.5rem;
        overflow: hidden;
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary);
        border: var(--neon-border-width) solid var(--neon-secondary);
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-secondary);
      }
      .card-content {
        padding: 1rem;
      }
      .card h3 {
        margin-bottom: 0.5rem;
        color: var(--text-color);
        text-shadow: 0 0 5px var(--neon-secondary);
      }
      .card-meta {
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .loading-container {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 2rem 0;
      }
      .recent-follower-card {
        background: var(--stats-card-bg);
        padding: 1.5rem;
        min-height: 100%;
        border-radius: var(--card-radius);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
        border: var(--neon-border-width) solid var(--neon-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        transition: all 0.3s ease;
      }
      .recent-follower-card:hover {
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
      .recent-follower-card h3 {
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        text-align: center;
        text-shadow: 0 0 5px var(--neon-primary);
      }
      .recent-follower-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: var(--neon-border-width) solid var(--neon-primary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .recent-follower-name {
        font-size: 1.1rem;
        color: var(--text-color);
        text-align: center;
        text-shadow: 0 0 5px var(--neon-primary);
      }
      .load-more {
        display: none;
        margin: 2rem auto;
        padding: 1rem 2rem;
        background: var(--neon-primary);
        border: none;
        border-radius: 0.5rem;
        color: white;
        cursor: pointer;
        font-size: 1.1rem;
        transition: background 0.2s, box-shadow 0.2s;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .load-more:hover {
        background: #d400d4;
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
      .preview-image {
        width: 100%;
        height: 200px;
        background: rgba(0, 0, 0, 0.5);
        object-fit: cover;
        transition: opacity 0.2s;
      }
      .card:hover .preview-image {
        opacity: 0.9;
      }
      .card-stats {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .user-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 1rem;
      }
      .user-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        background: var(--card-bg);
        padding: 1rem;
        border-radius: var(--card-radius);
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .user-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-tertiary);
      }
      .user-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 0.5rem;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .user-name {
        font-size: 0.9rem;
        color: var(--text-color);
        word-break: break-word;
        text-shadow: 0 0 5px var(--neon-tertiary);
      }
      .sort-controls {
        margin-bottom: 1.5rem;
        display: flex;
        gap: 0.5rem;
      }
      .sort-button {
        background: rgba(0, 0, 0, 0.3);
        border: var(--neon-border-width) solid var(--neon-secondary);
        color: var(--text-secondary);
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 0 calc(var(--neon-glow) * 0.5) var(--neon-secondary);
      }
      .sort-button:hover {
        background: rgba(0, 238, 255, 0.2);
        color: var(--text-color);
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary);
      }
      .sort-button.active {
        background: var(--neon-secondary);
        color: var(--text-color);
        box-shadow: 0 0 calc(var(--neon-glow) * 1.5) var(--neon-secondary);
      }
      .search-box {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        display: flex;
        align-items: center;
      }
      .search-input {
        padding: 8px 12px;
        border-radius: 4px;
        border: var(--neon-border-width) solid var(--neon-tertiary);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 16px;
        width: 200px;
        box-shadow: 0 0 var(--neon-glow) var(--neon-tertiary);
      }
      .search-input::placeholder {
        color: var(--text-secondary);
      }
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        z-index: 1000;
      }
      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        background: var(--card-bg);
        border-radius: 1rem;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        z-index: 1001;
        width: 80vw;
        height: 80vh;
        display: flex;
        flex-direction: column;
        border: var(--neon-border-width) solid var(--neon-primary);
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .modal.active {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
      }
      .modal-close {
        position: absolute;
        top: -40px;
        right: 0;
        background: none;
        border: none;
        color: white;
        font-size: 2rem;
        cursor: pointer;
        padding: 0.5rem;
        transition: transform 0.2s;
        text-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .modal-close:hover {
        transform: scale(1.1);
      }
      .modal iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 1rem;
        flex: 1;
        margin-bottom: 10px;
      }
      .open-new-tab {
        text-align: center;
        padding: 10px;
        text-decoration: none;
        color: var(--neon-secondary);
        font-size: 1rem;
        transition: color 0.2s;
        text-shadow: 0 0 5px var(--neon-secondary);
      }
      .open-new-tab:hover {
        color: white;
        text-shadow: 0 0 10px var(--neon-secondary);
      }
      #recent-follower {
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      #recent-follower:hover {
        transform: scale(1.05);
      }
      .search-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--neon-primary);
        color: white;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        cursor: pointer;
        margin-left: 10px;
        box-shadow: 0 0 var(--neon-glow) var(--neon-primary);
      }
      .search-toggle:hover {
        box-shadow: 0 0 calc(var(--neon-glow) * 2) var(--neon-primary);
      }
      
      .project-visibility-indicator {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: rgba(0, 0, 0, 0.7);
        color: var(--neon-primary);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
        z-index: 10;
        border: 1px solid var(--neon-primary);
        box-shadow: 0 0 5px var(--neon-primary);
      }
      
      .visibility-toggle {
        background: rgba(0, 0, 0, 0.3);
        border: var(--neon-border-width) solid var(--neon-secondary);
        color: var(--text-secondary);
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-left: 1rem;
        box-shadow: 0 0 calc(var(--neon-glow) * 0.5) var(--neon-secondary);
      }
      
      .visibility-toggle:hover {
        background: rgba(0, 238, 255, 0.2);
        color: var(--text-color);
        box-shadow: 0 0 var(--neon-glow) var(--neon-secondary);
      }
      
      .visibility-toggle.active {
        background: var(--neon-secondary);
        color: var(--text-color);
        box-shadow: 0 0 calc(var(--neon-glow) * 1.5) var(--neon-secondary);
      }
    </style>
  </head>
  <body>
    <canvas id="grid-background"></canvas>
    <div class="container" id="app">
      <div class="search-box">
        <input type="text" class="search-input" placeholder="Enter username..." id="user-search">
        <button id="search-toggle" class="search-toggle">🔍</button>
      </div>
      <div style="display: grid; grid-template-columns: 1fr auto; gap: 2rem; margin-bottom: 2rem;">
        <div class="profile-header">
          <img class="avatar" id="avatar" alt="Profile avatar">
          <div class="profile-info">
            <h1>
              <span id="username" contenteditable="true" style="outline: none; border-bottom: 1px dashed var(--neon-secondary); padding: 0 4px;"></span>
              <span class="username-hint">← You can edit the name!</span>
            </h1>
            <p id="description"></p>
            <div class="social-links"></div>
          </div>
        </div>
        <div class="stat-card recent-follower-card" style="margin: 0; height: fit-content;">
          <h3>🥰 Latest Follower</h3>
          <div id="recent-follower">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>
      <div class="stats">
        <div class="stat-card">
          <h3>🌐 Projects</h3>
          <div class="value" id="sites-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>👁️ Views</h3>
          <div class="value" id="views-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>❤️ Likes</h3>
          <div class="value" id="likes-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🥰 Followers</h3>
          <div class="value" id="followers-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>😍 Following</h3>
          <div class="value" id="following-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🎉 Popularity</h3>
          <div class="value" id="popularity-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>⭐ Quality</h3>
          <div class="value" id="rating-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>📅 Joined</h3>
          <div class="value" id="joined-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>👥 Friends</h3>
          <div class="value" id="friends-count"><div class="loading-spinner"></div></div>
        </div>
        <div class="stat-card">
          <h3>🤫 Unposted</h3>
          <div class="value" id="unposted-count"><div class="loading-spinner"></div></div>
        </div>
      </div>
      <div class="content-section">
        <div class="sort-controls">
          <button class="view-button active" data-view="projects">Projects</button>
          <button class="view-button" data-view="followers">Followers</button>
          <button class="view-button" data-view="following">Following</button>
          <button class="view-button" data-view="friends">Friends</button>
        </div>
        <div id="projects-view" class="view-content">
          <div class="sort-controls">
            <button class="sort-button active" data-sort="recent">Recent</button>
            <button class="sort-button" data-sort="views">Most Viewed</button>
            <button class="sort-button" data-sort="likes">Most Liked</button>
            <button id="show-private" class="visibility-toggle">Show Private</button>
          </div>
          <div class="grid" id="projects-grid"></div>
          <div class="loading-container" id="projects-loading">
            <div class="loading-spinner"></div>
          </div>
          <button id="load-more-projects" class="load-more">Load More</button>
        </div>
        <div id="followers-view" class="view-content" style="display:none">
          <div class="user-grid" id="followers-grid"></div>
          <div class="loading-container" id="followers-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <div id="following-view" class="view-content" style="display:none">
          <div class="user-grid" id="following-grid"></div>
          <div class="loading-container" id="following-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <div id="friends-view" class="view-content" style="display:none">
          <div class="user-grid" id="friends-grid"></div>
          <div class="loading-container" id="friends-loading">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-overlay">
      <div class="modal">
        <button class="modal-close">×</button>
        <iframe></iframe>
        <a class="open-new-tab" target="_blank">↗️ Open in new tab</a>
      </div>
    </div>
    
    <script>
      // Initialize WebsimSocket for persistent data storage
      const room = new WebsimSocket();
      
      // Config and Tweakable Values
      /* @tweakable Number of grid lines in the background */
      const gridLineCount = 20;
      
      /* @tweakable Grid horizon position (0.0-1.0, higher values push horizon down) */
      const gridHorizon = 0.5;
      
      /* @tweakable Grid animation speed (pixels per second) */
      const gridSpeed = 20;
      
      /* @tweakable Primary grid color */
      const gridColorPrimary = "#ff00ff";
      
      /* @tweakable Secondary grid color */
      const gridColorSecondary = "#00eeff";
      
      /* @tweakable Grid line width */
      const gridLineWidth = 2;
      
      /* @tweakable Grid line glow intensity */
      const gridGlowIntensity = 10;
      
      /* @tweakable Sun size in pixels */
      const synthSunSize = 120;
      
      /* @tweakable Sun color */
      const synthSunColor = "#ff00ff";
      
      /* @tweakable Base size of user avatar in follower/following lists in pixels */
      const userAvatarSize = 80;
      
      /* @tweakable Height of the project preview image in pixels */
      const projectPreviewHeight = 200;
      
      /* @tweakable Maximum projects to load per batch */
      const projectBatchSize = 50;
      
      /* @tweakable Maximum followers/following to load per batch */
      const userBatchSize = 50;

      /**
       * Format numbers according to settings
       */
      /* @tweakable Maximum number to display before using K/M notation (e.g., 5.2K) */
      const numberFormatThreshold = 10000;
      
      function formatNumber(num) {
        if (num === undefined || num === null) return '0';
        
        if (useCommaFormatting || num < numberFormatThreshold) {
          return num.toLocaleString();
        } else {
          if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
          } else if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'K';
          } else {
            return num.toString();
          }
        }
      }
      
      /**
       * Store user statistics in WebsimSocket persistent storage
       */
      async function storeUserStats(stats) {
        try {
          await room.collection('user_stats').create({
            username: stats.username,
            stats: stats,
            timestamp: new Date().toISOString()
          });
        } catch (error) {
          console.error('Error storing user stats:', error);
        }
      }
      
      /**
       * Calculate percentile of a value compared to stored stats
       */
      async function calculatePercentile(value, statName) {
        if (!enablePercentiles) return null;
        
        try {
          const records = room.collection('user_stats').getList();
          if (!records || records.length === 0) return null;
          
          const values = records
            .filter(r => r.stats && r.stats[statName] !== undefined && r.stats[statName] !== null)
            .map(r => r.stats[statName]);
          
          if (values.length === 0) return null;
          
          values.sort((a, b) => b - a);
          const position = values.findIndex(v => v <= value) + 1;
          return Math.round((1 - (position / values.length)) * 100);
        } catch (error) {
          console.error('Error calculating percentile:', error);
          return null;
        }
      }
      
      /**
       * Update a stat element with value and percentile information
       */
      async function updateStatWithPercentile(elementId, value, statName) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        if (isNaN(value) || value === undefined || value === null) {
          element.innerHTML = '0';
          return;
        }
        
        try {
          const percentile = await calculatePercentile(value, statName);
          let suffix = "";
          
          if (statName === 'popularity') {
            suffix = "/10";
          } else if (statName === 'rating') {
            suffix = "/5";
          }
          
          if (percentile === null || isNaN(percentile)) {
            element.innerHTML = `${formatNumber(value)}${suffix}`;
          } else {
            element.innerHTML = `
              ${formatNumber(value)}${suffix}
              <div style="font-size: 0.8rem; color: #888; margin-top: 0.5rem;">
                Top ${percentile}%
              </div>
            `;
          }
        } catch (error) {
          console.error(`Error updating stat ${elementId}:`, error);
          element.innerHTML = `${formatNumber(value) || '0'}`;
        }
      }
      
      /**
       * Format relative time (e.g., "2d" for 2 days ago)
       */
      function getRelativeTimeString(date) {
        if (!(date instanceof Date)) {
          date = new Date(date);
        }
        
        if (isNaN(date.getTime())) {
          return 'Invalid date';
        }
        
        const now = new Date();
        const diffMs = now - date;
        const diffSecs = Math.floor(diffMs / 1000);
        const diffMins = Math.floor(diffSecs / 60);
        const diffHours = Math.floor(diffMins / 60);
        const diffDays = Math.floor(diffHours / 24);
        const diffMonths = Math.floor(diffDays / 30);
        const diffYears = Math.floor(diffDays / 365);
        
        if (diffYears > 0) return `${diffYears}y`;
        if (diffMonths > 0) return `${diffMonths}mo`;
        if (diffDays > 0) return `${diffDays}d`;
        if (diffHours > 0) return `${diffHours}h`;
        if (diffMins > 0) return `${diffMins}m`;
        return `${diffSecs}s`;
      }

      /**
       * Find the intersection of followers and following (friends)
       */
      async function getFriends() {
        try {
          const friendsGrid = document.getElementById('friends-grid');
          friendsGrid.innerHTML = '';
          
          const friendsLoading = document.getElementById('friends-loading');
          friendsLoading.style.display = 'block';
          
          // Initialize objects to store all followers and following
          let allFollowers = {};
          let allFollowing = {};
          
          // Fetch all followers
          let followersAfter = null;
          let hasMoreFollowers = true;
          
          while (hasMoreFollowers) {
            const followers = await fetchFollowers(followersAfter);
            followers.data.forEach(item => {
              allFollowers[item.user.id] = item.user;
            });
            
            hasMoreFollowers = followers.meta.has_next_page;
            followersAfter = followers.meta.end_cursor;
          }
          
          // Fetch all following
          let followingAfter = null;
          let hasMoreFollowing = true;
          
          while (hasMoreFollowing) {
            const following = await fetchFollowing(followingAfter);
            following.data.forEach(item => {
              allFollowing[item.user.id] = item.user;
            });
            
            hasMoreFollowing = following.meta.has_next_page;
            followingAfter = following.meta.end_cursor;
          }
          
          // Find intersection (friends)
          let friends = [];
          Object.keys(allFollowers).forEach(userId => {
            if (allFollowing[userId]) {
              friends.push(allFollowers[userId]);
            }
          });
          
          // Update friends count
          document.getElementById('friends-count').innerHTML = formatNumber(friends.length);
          
          // Generate UI
          friendsLoading.style.display = 'none';
          
          if (friends.length === 0) {
            friendsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-secondary);">No mutual connections yet!</div>`;
            return;
          }
          
          friends.forEach(user => {
            const card = createUserCard(user);
            friendsGrid.appendChild(card);
          });
        } catch (error) {
          console.error('Error loading friends:', error);
          document.getElementById('friends-loading').style.display = 'none';
          document.getElementById('friends-grid').innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-secondary);">Error loading friends data</div>`;
        }
      }

          params.append('first', '100');
          params.append('posted', 'false');
          
          const response = await fetch(`/api/v1/users/${username}/projects?${params}`);
          if (!response.ok) {
            throw new Error(`Failed to fetch unposted projects: ${response.status}`);
          }
          
          const data = await response.json();
          let totalCount = data.projects.data.length;
          let hasNextPage = data.projects.meta.has_next_page;
          let nextCursor = data.projects.meta.end_cursor;
          
          // Continue fetching if there are more pages
          while (hasNextPage) {
            params.set('after', nextCursor);
            const nextResponse = await fetch(`/api/v1/users/${username}/projects?${params}`);
            
            if (!nextResponse.ok) {
              console.error('Error fetching more unposted projects');
              break;
            }
            
            const nextData = await nextResponse.json();
            totalCount += nextData.projects.data.length;
            hasNextPage = nextData.projects.meta.has_next_page;
            nextCursor = nextData.projects.meta.end_cursor;
          }
          
          return totalCount;
        } catch (error) {
          console.error('Error fetching unposted projects:', error);
          return 0;
        }
      }

      /**
       * Update stats with direct API data
       */
      async function updateWithDirectStats() {
        try {
          // Fetch direct stats from API
          const stats = await fetchUserStats();
          
          // Update views and likes directly from API
          document.getElementById('views-count').innerHTML = formatNumber(stats.total_views || 0);
          document.getElementById('likes-count').innerHTML = formatNumber(stats.total_likes || 0);
          
          // Calculate popularity and rating based on these direct values
          let popularityScore = 0;
          for (const threshold of popularityThresholds) {
            if ((stats.total_views || 0) >= threshold.views && (stats.total_likes || 0) >= threshold.likes) {
              popularityScore = threshold.score;
              break;
            }
          }
          
          // Calculate quality rating
          let rating = 0;
          if ((stats.total_likes || 0) > 0 && (stats.total_views || 0) > 0) {
            const viewsPerLike = stats.total_views / stats.total_likes;
            rating = ratingThresholds.find(t => viewsPerLike >= t.viewsPerLike)?.score || 5;
          } else if ((stats.total_likes || 0) > 0) {
            rating = 5; // Max rating if likes but no views
          }
          
          // Update the stats display
          await updateStatWithPercentile('popularity-count', popularityScore, 'popularity');
          await updateStatWithPercentile('rating-count', rating, 'rating');
          
          return stats;
        } catch (error) {
          console.error('Error updating direct stats:', error);
        }
      }

      async function loadMoreProjects() {

          isLoading = true;
          
          const projectLoadingEl = document.getElementById('projects-loading');
          const loadMoreBtn = document.getElementById('load-more-projects');
          
          projectLoadingEl.style.display = 'block';

          projectsData = projectsData.concat(data.data);
          
          // Update projects count immediately
          document.getElementById('sites-count').innerHTML = formatNumber(projectsData.length);
          
          // Update stats from direct API once we have some projects
          if (projectsData.length >= initialStatsProjectCount && !projectsAfterCursor) {
            await updateWithDirectStats();
          }
          
          if (data.meta.has_next_page) {
            projectsAfterCursor = data.meta.end_cursor;
            isLoading = false;
            
            // Update the UI with what we have so far
            sortProjects();
            
            // Continue loading more projects
            setTimeout(() => loadMoreProjects(), 100);
            return;

          // All projects loaded, finalize stats
          const totalProjects = projectsData.length;
          document.getElementById('sites-count').innerHTML = formatNumber(totalProjects);
          
          // Update project grid
          sortProjects();

      /**
       * Sort and display projects according to current sort criterion
       */
      function sortProjects() {
        try {
          const projectsGrid = document.getElementById('projects-grid');
          projectsGrid.innerHTML = '';
          
          let sortedProjects = [...projectsData];
          switch (currentSort) {
            case 'views':
              sortedProjects.sort((a, b) => b.project.stats.views - a.project.stats.views);
              break;
            case 'likes':
              sortedProjects.sort((a, b) => b.project.stats.likes - a.project.stats.likes);
              break;
            case 'recent':
            default:
              sortedProjects.sort((a, b) => new Date(b.project.created_at) - new Date(a.project.created_at));
              break;
          }
          
          sortedProjects.forEach(({ project, project_revision, site }) => {
            const card = createProjectCard(project, project_revision, site);
            projectsGrid.appendChild(card);
          });
        } catch (error) {
          console.error('Error sorting projects:', error);
        }
      }
      
      /**
       * Initialize the user profile page
       */
      async function initProfile() {
        try {
          document.querySelector('.username-hint').classList.add('hidden');
          resetStatsToLoading();
          
          const user = await fetchUserProfile();
          if (!user) {
            document.getElementById('description').innerHTML = 'Error: User not found.';
            return;
          }
          
          window.currentUserProfile = user;
          document.getElementById('username').textContent = user.username;
          document.getElementById('avatar').src = user.avatar_url || '';
          document.getElementById('avatar').onerror = function() {
            this.src = 'https://images.websim.ai/avatar/anonymous';
          };
          
          initSynthwaveBackground();
          
          // Update joined date
          const joinedEl = document.getElementById('joined-count');
          joinedEl.className = 'value joined';
          const joinedDate = new Date(user.created_at);
          joinedEl.innerHTML = `
            <div>${getRelativeTimeString(joinedDate)}</div>
            <div class="ago">ago</div>
          `;
          
          // Get initial counts directly from API
          const [followingCount, followersCount, stats] = await Promise.all([
            fetchFollowingCount(),
            fetchFollowersCount(),
            fetchUserStats()
          ]);
          
          document.getElementById('following-count').innerHTML = formatNumber(followingCount || 0);
          document.getElementById('followers-count').innerHTML = formatNumber(followersCount || 0);
          document.getElementById('views-count').innerHTML = formatNumber(stats.total_views || 0);
          document.getElementById('likes-count').innerHTML = formatNumber(stats.total_likes || 0);
          
          // Reset project data
          projectsData = [];
          projectsAfterCursor = null;
          
          // Update visibility toggle button state
          const showPrivateButton = document.getElementById('show-private');
          if (isViewingOwnProfile() || showOtherUsersPrivateProjects) {
            showPrivateButton.style.display = 'inline-block';
            showPrivateButton.textContent = isShowingPrivate ? 'Show Public Only' : 'Show Private';
            showPrivateButton.classList.toggle('active', isShowingPrivate);
          } else {
            showPrivateButton.style.display = 'none';
          }
          
          // Fetch all data concurrently
          Promise.allSettled([
            fetchRecentFollower(),
            loadMoreProjects(),
            fetchUnpostedProjects().then(unpostedCount => {
              updateStatWithPercentile('unposted-count', unpostedCount, 'unposted');
            })
          ]).then(results => {
            results.forEach(result => {
              if (result.status === 'rejected') {
                console.error('Error during concurrent data loading:', result.reason);
              }
            });
          });
          
          // Set up event listeners for sort buttons
          document.querySelectorAll('.sort-button').forEach(button => {
            button.addEventListener('click', () => {
              document.querySelectorAll('.sort-button').forEach(b => b.classList.remove('active'));
              button.classList.add('active');
              currentSort = button.dataset.sort;
              sortProjects();
            });
          });
          
          // Set up event listener for visibility toggle
          const visibilityToggle = document.getElementById('show-private');
          visibilityToggle.addEventListener('click', async () => {
            isShowingPrivate = !isShowingPrivate;
            visibilityToggle.textContent = isShowingPrivate ? 'Show Public Only' : 'Show Private';
            visibilityToggle.classList.toggle('active', isShowingPrivate);
            
            // Reset project data and refetch
            projectsData = [];
            projectsAfterCursor = null;
            document.getElementById('projects-grid').innerHTML = '';
            await loadMoreProjects();
          });
          
          // Set up event listeners for view buttons
          document.querySelectorAll('.view-button').forEach(button => {
            button.addEventListener('click', async () => {
              document.querySelectorAll('.view-button').forEach(b => b.classList.remove('active'));
              button.classList.add('active');
              
              document.querySelectorAll('.view-content').forEach(view => {
                view.style.display = 'none';
              });
              
              const viewType = button.dataset.view;
              const viewElement = document.getElementById(`${viewType}-view`);
              viewElement.style.display = 'block';
              
              if (viewType === 'followers' && !followersAfterCursor) {
                await loadMoreFollowers();
              } else if (viewType === 'following' && !followingAfterCursor) {
                await loadMoreFollowing();
              } else if (viewType === 'friends') {
                await getFriends();
              }
            });
          });
          
          // Set up search functionality
          const searchInput = document.getElementById('user-search');
          searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
              const newUsername = searchInput.value.trim();
              if (newUsername && newUsername !== username) {
                username = newUsername;
                await initProfile();
                searchInput.value = '';
              }
            }
          });
          
          const searchToggle = document.getElementById('search-toggle');
          searchToggle.addEventListener('click', async () => {
            const newUsername = searchInput.value.trim();
            if (newUsername && newUsername !== username) {
              username = newUsername;
              await initProfile();
              searchInput.value = '';
            }
          });
          
          // Set up modal close
          document.querySelector('.modal-close').addEventListener('click', () => {
            document.querySelector('.modal-overlay').classList.remove('active');
            document.querySelector('.modal').classList.remove('active');
            setTimeout(() => {
              document.querySelector('.modal iframe').src = '';
            }, 300);
          });
        } catch (error) {
          console.error('Error initializing profile:', error);
          document.getElementById('description').innerHTML = 'Error loading profile data.';
        }
      }
      
      // ===== UI CREATION FUNCTIONS =====
      
      /**
       * Create a user card element for followers/following/friends views
       */
      function createUserCard(user) {
        if (!user) return document.createElement('div');
        
        const card = document.createElement('a');
        card.href = `https://websim.ai/@${user.username}`;
        card.className = 'user-card';
        card.innerHTML = `
          <img class="user-avatar" src="${user.avatar_url || ''}" 
               alt="${user.username}'s avatar" 
               style="width: ${userAvatarSize}px; height: ${userAvatarSize}px;"
               onerror="this.src='https://images.websim.ai/avatar/anonymous'">
          <div class="user-name">${user.username}</div>
        `;
        
        card.addEventListener('click', async (e) => {
          e.preventDefault();
          
          // Set username display
          const usernameEl = document.getElementById('username');
          usernameEl.textContent = user.username;
          document.querySelector('.username-hint').classList.add('hidden');
          
          // Scroll to top
          window.scrollTo({ top: 0, behavior: 'smooth' });
          
          // Reset data
          projectsData = [];
          projectsAfterCursor = null;
          followersAfterCursor = null;
          followingAfterCursor = null;
          
          // Clear all grids
          document.getElementById('projects-grid').innerHTML = '';
          document.getElementById('followers-grid').innerHTML = '';
          document.getElementById('following-grid').innerHTML = '';
          document.getElementById('friends-grid').innerHTML = '';
          
          // Reset stats displays
          resetStatsToLoading();
          
          // Update current username and initialize new profile
          username = user.username;
          await initProfile();
        });
        
        return card;
      }
      
      /**
       * Create a project card element for projects view
       */
      function createProjectCard(project, project_revision, site) {
        if (!project) return document.createElement('div');
        
        const card = document.createElement('div');
        card.className = 'card';
        card.style.position = 'relative';
        
        // Set border color based on visibility
        if (project.visibility === 'private') {
          card.style.borderColor = privateProjectBorderColor;
        } else if (project.visibility === 'unlisted') {
          card.style.borderColor = unlistedProjectBorderColor;
        }
        
        // Create preview image or placeholder
        const previewHtml = site
          ? `<img class="preview-image" 
                  src="https://images.websim.ai/v1/site/${site.id}/600" 
                  alt="Preview of ${project.title || 'Untitled Project'}" 
                  style="height: ${projectPreviewHeight}px;"
                  loading="lazy"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="preview-image" 
                  style="height: ${projectPreviewHeight}px; display: none; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.5); color: var(--text-secondary);">
               No Preview Available
             </div>`
          : `<div class="preview-image" 
                 style="height: ${projectPreviewHeight}px; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.5); color: var(--text-secondary);">
                No Preview
              </div>`;
        
        // Add visibility indicator if enabled
        let visibilityIndicator = '';
        if (showVisibilityIndicator) {
          let visibilityText = '';
          if (project.visibility === 'private') {
            visibilityText = privateProjectText;
          } else if (project.visibility === 'unlisted') {
            visibilityText = unlistedProjectText;
          } else {
            visibilityText = publicProjectText;
          }
          
          visibilityIndicator = `<div class="project-visibility-indicator">${visibilityText}</div>`;
        }
        
        card.innerHTML = `
          ${visibilityIndicator}
          <div class="project-link" style="text-decoration: none; color: inherit; cursor: pointer;">
            ${previewHtml}
            <div class="card-content">
              <h3>${project.title || 'Untitled Project'}</h3>
              <div class="card-stats">
                <span>👁️ ${formatNumber(project.stats.views)}</span>
                <span>❤️ ${formatNumber(project.stats.likes)}</span>
              </div>
              <div class="card-meta">
                ${getRelativeTimeString(new Date(project.created_at))} ago
              </div>
            </div>
          </div>
        `;
        
        // Add click handler to open modal
        const projectLink = card.querySelector('.project-link');
        projectLink.addEventListener('click', (e) => {
          e.preventDefault();
          
          const modal = document.querySelector('.modal');
          const overlay = document.querySelector('.modal-overlay');
          const iframe = modal.querySelector('iframe');
          const projectUrl = `https://websim.ai/p/${project.id}`;
          
          iframe.src = projectUrl;
          
          let openNewTab = modal.querySelector('.open-new-tab');
          if (!openNewTab) {
            openNewTab = document.createElement('a');
            openNewTab.className = 'open-new-tab';
            openNewTab.target = '_blank';
            openNewTab.textContent = '↗️ Open in new tab';
            modal.appendChild(openNewTab);
          }
          openNewTab.href = projectUrl;
          
          overlay.classList.add('active');
          modal.classList.add('active');
        });
        
        return card;
      }
      
      /**
       * Check if we're viewing our own profile
       */
      function isViewingOwnProfile() {
        return currentUser && currentUser.username === username;
      }
      
      /**
       * Generate a bio text based on user stats
       */
      /* @tweakable Include additional details in auto-generated bio */
      const bioIncludeProjectDetails = true;

      /* @tweakable Include social stats in auto-generated bio */
      const bioIncludeSocialStats = true;
      
      function generateBioText(userStats) {
        if (!userStats || !window.currentUserProfile) {
          return 'Loading bio...';
        }
        
        const user = window.currentUserProfile;
        
        if (!projectsData || projectsData.length === 0) {
          return `Hello! My name is ${user.username}. I joined websim on ${new Date(user.created_at).toLocaleDateString()}.`;
        }
        
        let bioText = `Hello! My name is ${user.username} and I joined websim on ${new Date(user.created_at).toLocaleDateString()}. `;
        
        // Project stats
        const totalViews = userStats.views;
        const projectsCount = userStats.projects;
        
        bioText += `Since then, I've made ${projectsCount} project${projectsCount > 1 ? 's' : ''}`;
        if (totalViews > 0) { 
          bioText += ` with ${formatNumber(totalViews)} total views`; 
        }
        bioText += '. ';
        
        if (bioIncludeProjectDetails) {
          // Sort projects to find latest, most viewed, most liked
          const sortedByDate = [...projectsData].sort((a, b) => 
            new Date(b.project.created_at) - new Date(a.project.created_at));
          
          const sortedByViews = [...projectsData].sort((a, b) => 
            b.project.stats.views - a.project.stats.views);
          
          const sortedByLikes = [...projectsData].sort((a, b) => 
            b.project.stats.likes - a.project.stats.likes);
          
          // Add latest project info
          if (sortedByDate.length > 0) {
            const latestProject = sortedByDate[0].project;
            bioText += `My latest project is <a href="https://websim.ai/p/${latestProject.id}" style="color: var(--neon-secondary);">${latestProject.title || 'Untitled'}</a>`;
            
            const projectDate = new Date(latestProject.created_at).toLocaleDateString();
            if (projectDate !== new Date(user.created_at).toLocaleDateString()) {
              bioText += ` which I made on ${projectDate}`;
            }
            bioText += '. ';
          }
          
          // Add most viewed project info
          if (sortedByViews.length > 0 && sortedByViews[0].project.stats.views > 0) {
            const mostViewedProject = sortedByViews[0].project;
            bioText += `My most viewed project is <a href="https://websim.ai/p/${mostViewedProject.id}" style="color: var(--neon-secondary);">${mostViewedProject.title || 'Untitled'}</a> with ${formatNumber(mostViewedProject.stats.views)} views. `;
          }
          
          // Add most liked project info
          if (sortedByLikes.length > 0 && sortedByLikes[0].project.stats.likes > 0) {
            const mostLikedProject = sortedByLikes[0].project;
            bioText += `My most liked project is <a href="https://websim.ai/p/${mostLikedProject.id}" style="color: var(--neon-secondary);">${mostLikedProject.title || 'Untitled'}</a> with ${formatNumber(mostLikedProject.stats.likes)} likes. `;
          }
        }
        
        // Add social info
        if (bioIncludeSocialStats) {
          let socialText = [];
          if (userStats.following > 0) {
            socialText.push(`I'm following ${formatNumber(userStats.following)} people`);
          }
          
          if (userStats.followers > 0) {
            socialText.push(`${formatNumber(userStats.followers)} ${userStats.followers === 1 ? 'person who follows' : 'people who follow'} me`);
          }
          
          if (socialText.length > 0) {
            bioText += socialText.join(' and ') + '.';
          }
        }
        
        return bioText;
      }
      
      // ===== SYNTHWAVE BACKGROUND ANIMATION =====
      /**
       * Initialize synthwave grid background
       */
      function initSynthwaveBackground() {
        const canvas = document.getElementById('grid-background');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas to window size
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Animation variables
        let offset = 0;
        
        // Animation loop
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Draw background gradient
          const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
          gradient.addColorStop(0, '#120638');
          gradient.addColorStop(0.5, '#2d1b69');
          gradient.addColorStop(1, '#5a1a80');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
          // Draw sun
          const sunRadius = synthSunSize / 2;
          const sunY = canvas.height * gridHorizon;
          ctx.beginPath();
          ctx.arc(canvas.width / 2, sunY, sunRadius, 0, Math.PI * 2);
          ctx.fillStyle = synthSunColor;
          ctx.shadowColor = synthSunColor;
          ctx.shadowBlur = 30;
          ctx.fill();
          ctx.shadowBlur = 0;
          
          // Draw horizontal grid lines
          const horizonY = canvas.height * gridHorizon;
          const gridSpacing = canvas.width / gridLineCount;
          
          // Reset shadows for grid
          ctx.shadowColor = gridColorPrimary;
          ctx.shadowBlur = gridGlowIntensity;
          
          // Vertical lines (perspective)
          ctx.lineWidth = gridLineWidth;
          
          for (let i = 0; i <= gridLineCount; i++) {
            const x = i * gridSpacing;
            
            // Primary lines
            ctx.beginPath();
            ctx.moveTo(x, horizonY);
            ctx.lineTo(x, canvas.height);
            ctx.strokeStyle = gridColorPrimary;
            ctx.stroke();
          }
          
          // Horizontal lines with animation
          const horizontalLines = 20;
          const animatedOffset = (offset % gridSpacing);
          
          ctx.shadowColor = gridColorSecondary;
          
          for (let i = 0; i <= horizontalLines; i++) {
            const progress = i / horizontalLines;
            const y = horizonY + (canvas.height - horizonY) * progress;
            
            // Calculate perspective width
            const perspectiveWidth = progress * canvas.width * 0.8;
            const xStart = (canvas.width - perspectiveWidth) / 2;
            const xEnd = xStart + perspectiveWidth;
            
            ctx.beginPath();
            ctx.moveTo(xStart, y);
            ctx.lineTo(xEnd, y);
            ctx.strokeStyle = gridColorSecondary;
            ctx.stroke();
          }
          
          // Update animation
          offset += gridSpeed / 60; // Speed adjusted for 60fps
          
          // Continue animation
          requestAnimationFrame(animate);
        }
        
        // Start animation
        animate();
      }

      document.querySelector('.username-hint').classList.remove('hidden');

      room.initialize().then(async () => {

            isShowingPrivate = true;
          }
        } catch (error) {
          console.error("Error getting current user:", error);
        }
        
        initProfile();
      });

      document.getElementById('user-search').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
          const newUsername = e.target.value.trim();
          if (newUsername && newUsername !== username) {
            username = newUsername;
            await initProfile();
            e.target.value = '';
          }
        }
      });
